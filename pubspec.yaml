name: wog_app
description: "World of God - Gospel App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  flutter_svg: ^2.2.4
  cached_network_image: ^3.4.1

  # Bible & Data Handling
  xml: ^6.6.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  sqflite: ^2.4.2

  # Firebase Features
  firebase_core: ^3.15.2
  firebase_database: ^11.3.10
  firebase_auth: ^5.7.0
  firebase_storage: ^12.4.10

  # Audio & Media
  audioplayers: ^5.2.1
  video_player: ^2.11.1
  chewie: ^1.13.0
  just_audio: ^0.9.46
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/bible.xml
    - assets/references/
    - assets/tsk.txt
    # ఒకవేళ ఇమేజెస్ ఉంటే ఇక్కడ యాడ్ చెయ్
    # - assets/images/logo.png

  # Fonts (Google Fonts ప్యాకేజీ వాడుతున్నాం కాబట్టి ఇక్కడ అవసరం లేదు, 
  # కానీ ఆఫ్లైన్ లో కావాలంటే ఇక్కడ ఇవ్వాలి)
